<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
    <head>
        <meta charset="utf-8" />
        <title>/*[|template_title|]*/0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
            rel="stylesheet"

        <style>
            :root {
                --bg: #fbf8f3;
                --text: #2a2a2a;
                --muted: #6c6c6c;
                --brand: #8f6b4f;
                --brand-dark: #704e34;
                --card: #ffffff;
                --border: #e6dfd6;
            }

            * {
                box-sizing: border-box;
            }

            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
            }

            .staticrypt-body {
                font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
                color: var(--text);
                background: var(--bg);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 2rem;
            }

            .staticrypt-content {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
            }

            .staticrypt-page {
                width: min(440px, 100%);
                text-align: center;
            }

            .staticrypt-brand {
                font-family: "Playfair Display", Georgia, serif;
                font-size: 1.8rem;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 0.5rem;
            }

            .staticrypt-eyebrow {
                text-transform: uppercase;
                letter-spacing: 0.12em;
                font-size: 0.75rem;
                color: var(--muted);
                margin-bottom: 2rem;
            }

            .staticrypt-form {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 2.5rem 2rem;
                text-align: center;
            }

            .staticrypt-title {
                font-family: "Playfair Display", Georgia, serif;
                font-size: 1.5rem;
                font-weight: 600;
                margin: 0 0 0.3rem;
            }

            .staticrypt-instructions {
                color: var(--muted);
                font-size: 0.95rem;
                margin: 0 0 1.5rem;
                line-height: 1.5;
            }

            .staticrypt-password-container {
                position: relative;
                width: 100%;
                margin-bottom: 1rem;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                padding: 0.85rem 2.8rem 0.85rem 1rem;
                border: 1px solid var(--border);
                border-radius: 999px;
                font-size: 1rem;
                font-family: inherit;
                background: var(--bg);
                color: var(--text);
                outline: none;
                transition: border-color 180ms ease;
            }

            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                border-color: var(--brand);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.5;
                position: absolute;
                right: 1rem;
                top: 50%;
                transform: translateY(-50%);
                transition: opacity 180ms ease;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.8;
            }

            .staticrypt-decrypt-button {
                display: inline-block;
                width: 100%;
                padding: 0.85rem 1.1rem;
                background: var(--brand);
                color: #fff;
                border: 1px solid var(--brand);
                border-radius: 999px;
                font-size: 1rem;
                font-weight: 600;
                font-family: inherit;
                cursor: pointer;
                transition: background 180ms ease, border-color 180ms ease;
                text-transform: none;
            }

            .staticrypt-decrypt-button:hover,
            .staticrypt-decrypt-button:active,
            .staticrypt-decrypt-button:focus {
                background: var(--brand-dark);
                border-color: var(--brand-dark);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 1rem;
                font-size: 0.9rem;
                color: var(--muted);
            }

            .staticrypt-remember input[type="checkbox"] {
                margin-right: 0.6rem;
                accent-color: var(--brand);
                transform: scale(1.2);
            }

            .staticrypt-footer {
                margin-top: 2rem;
                color: var(--muted);
                font-size: 0.85rem;
            }

            .staticrypt-error-msg {
                color: #c0392b;
                font-size: 0.9rem;
                margin-bottom: 1rem;
                display: none;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.2em solid var(--border);
                border-right-color: var(--brand);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

                </div>

                <div class="staticrypt-footer">
                    With love, Beatrice & Joseph
                </div>
            </div>
        </div>

                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",

                    document.getElementById("staticrypt_loading").classList.add("hidden");

                if (passwordInput.type === "password") {
                    passwordInput.type = "text";
                    toggleIcon.src = imgSrcEyeOpened;
                    toggleIcon.alt = templateToggleAltHide;
                    toggleIcon.title = templateToggleAltHide;
                } else {
                    passwordInput.type = "password";
                    toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow;
                    toggleIcon.title = templateToggleAltShow;
                }
            });

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
                    const errorEl = document.getElementById("staticrypt-error");
                    errorEl.textContent = templateError;
                    errorEl.style.display = "block";
                }
            });

</html>
